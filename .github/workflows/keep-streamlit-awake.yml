name: Keep Streamlit app awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$STREAMLIT_APP_URL" ]; then
            echo "STREAMLIT_APP_URL secret is not set."
            exit 1
          fi

          echo "Pinging $STREAMLIT_APP_URL"
          status_code=$(curl --retry 3 --retry-delay 10 --max-time 60 --silent --show-error \
            --user-agent "offer-catcher-keep-awake/1.0" \
            --output /dev/null \
            --write-out "%{http_code}" \
            "$STREAMLIT_APP_URL")
          echo "HTTP status: $status_code"
          echo "Ping completed."
